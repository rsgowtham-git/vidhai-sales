<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-theme',window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Vidhai Sales Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="nav">
        <div class="nav__inner">
            <a href="dashboard.html" class="nav__logo">
                <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-label="Vidhai">
                    <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
                    <path d="M12 14L20 28L28 14" stroke="var(--color-text-inverse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Vidhai
                <span class="nav__logo-badge">Sales</span>
            </a>
            <ul class="nav__links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="outreach-generator.html">Outreach</a></li>
                <li><a href="history.html" class="active">History</a></li>
                <li><a href="admin.html" id="navAdminLink" style="display:none;">Admin</a></li>
            </ul>
            <div class="nav__actions">
                <span class="nav__user" id="navUserEmail"></span>
                <button onclick="handleLogout()" class="btn-secondary btn-sm">Sign Out</button>
                <button class="nav__mobile-toggle" onclick="toggleMobileNav()" aria-label="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="nav__mobile-menu" id="mobileMenu">
            <a href="dashboard.html">Dashboard</a>
            <a href="outreach-generator.html">Outreach</a>
            <a href="history.html" class="active">History</a>
            <a href="admin.html" id="navAdminLinkMobile" style="display:none;">Admin</a>
            <button onclick="handleLogout()" class="btn-secondary btn-sm" style="align-self:flex-start;">Sign Out</button>
        </div>
    </nav>

    <main class="container page-content">
        <div class="page-header">
            <h1>Generation History</h1>
            <p>Browse and retrieve all your past playbooks and outreach content</p>
        </div>

        <div class="history-tabs">
            <button class="tab-btn tab-active" onclick="switchTab('decks')">Capability Decks</button>
            <button class="tab-btn" onclick="switchTab('pitches')">Pitch Scripts</button>
            <button class="tab-btn" onclick="switchTab('outreach')">Outreach</button>
        </div>

        <div id="decksTab" class="tab-content">
            <div id="decksList" class="page-loading">
                <span class="loading-spinner"></span>
                Loading...
            </div>
        </div>

        <div id="pitchesTab" class="tab-content" style="display: none;">
            <div id="pitchesList" class="page-loading">
                <span class="loading-spinner"></span>
                Loading...
            </div>
        </div>

        <div id="outreachTab" class="tab-content" style="display: none;">
            <div id="outreachList" class="page-loading">
                <span class="loading-spinner"></span>
                Loading...
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        function toggleMobileNav() {
            document.getElementById('mobileMenu').classList.toggle('open');
        }

        checkAuth();
        let currentTab = 'decks';

        async function loadHistory() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            // Load decks
            const { data: decks } = await supabase
                .from('generated_decks')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            displayDecks(decks || []);

            // Load pitches
            const { data: pitches } = await supabase
                .from('generated_pitches')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            displayPitches(pitches || []);

            // Load outreach
            const { data: outreach } = await supabase
                .from('generated_outreach')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            displayOutreach(outreach || []);
        }

        function displayDecks(decks) {
            const listEl = document.getElementById('decksList');

            if (decks.length === 0) {
                listEl.innerHTML = '<p class="empty-state">No decks generated yet. <a href="deck-generator.html">Create your first one</a></p>';
                return;
            }

            listEl.innerHTML = decks.map(deck => `
                <div class="history-item">
                    <div class="history-header">
                        <h3>${deck.company_name}</h3>
                        <span class="history-date">${formatDate(deck.created_at)}</span>
                    </div>
                    <div class="history-meta">
                        <span>${deck.deck_content.slides?.length || 0} slides</span>
                        <span>${deck.industry}</span>
                        ${deck.contact_name ? `<span>${deck.contact_name}</span>` : ''}
                    </div>
                    <div class="history-actions">
                        <button onclick='viewDeck(${JSON.stringify(deck.deck_content)})' class="btn-secondary btn-sm">View</button>
                        <button onclick='downloadDeckHistory(${JSON.stringify(deck.deck_content)})' class="btn-secondary btn-sm">Download</button>
                    </div>
                </div>
            `).join('');
        }

        function displayPitches(pitches) {
            const listEl = document.getElementById('pitchesList');

            if (pitches.length === 0) {
                listEl.innerHTML = '<p class="empty-state">No pitches generated yet. <a href="pitch-generator.html">Create your first one</a></p>';
                return;
            }

            listEl.innerHTML = '<p class="empty-state">Pitch generator coming soon!</p>';
        }

        function displayOutreach(outreachItems) {
            const listEl = document.getElementById('outreachList');

            if (outreachItems.length === 0) {
                listEl.innerHTML = '<p class="empty-state">No outreach playbooks generated yet. <a href="outreach-generator.html">Create your first one</a></p>';
                return;
            }

            listEl.innerHTML = outreachItems.map(item => {
                const criteria = item.icp_criteria || {};
                const contactCount = item.contact_count || (item.contacts ? item.contacts.length : 0);
                return `
                    <div class="history-item">
                        <div class="history-header">
                            <h3>${criteria.industryPersona || 'Outreach Playbook'}</h3>
                            <span class="history-date">${formatDate(item.created_at)}</span>
                        </div>
                        <div class="history-meta">
                            <span>${contactCount} contacts</span>
                            <span>${criteria.revenueRange || 'N/A'}</span>
                            ${criteria.locations && criteria.locations.length > 0 ? `<span>${criteria.locations.join(', ')}</span>` : ''}
                        </div>
                        <div class="history-actions">
                            <button onclick='viewOutreach(${JSON.stringify(item.contacts).replace(/'/g, "&#39;")})' class="btn-secondary btn-sm">View</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewOutreach(contacts) {
            if (!contacts || contacts.length === 0) {
                alert('No contact data available.');
                return;
            }
            let text = 'OUTREACH PLAYBOOK\n' + '='.repeat(60) + '\n\n';
            contacts.forEach((c, idx) => {
                text += `CONTACT ${idx + 1}: ${c.firstName} ${c.lastName}\n`;
                text += `Title: ${c.title}\nCompany: ${c.companyName}\nEmail: ${c.email}\nPhone: ${c.phone}\n`;
                text += `LinkedIn: ${c.linkedinUrl || 'N/A'}\n\n`;
            });
            downloadTextFile(text, 'Outreach_Playbook.txt');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            event.target.classList.add('tab-active');

            document.getElementById('decksTab').style.display = tab === 'decks' ? 'block' : 'none';
            document.getElementById('pitchesTab').style.display = tab === 'pitches' ? 'block' : 'none';
            document.getElementById('outreachTab').style.display = tab === 'outreach' ? 'block' : 'none';
        }

        function viewDeck(deckContent) {
            alert('Deck preview modal coming soon! For now, use Download.');
        }

        function downloadDeckHistory(deckContent) {
            let text = `${deckContent.company} - Capability Deck\n`;
            text += `Generated: ${deckContent.date}\n\n`;

            deckContent.slides.forEach((slide, idx) => {
                text += `SLIDE ${idx + 1}: ${slide.title}\n${'='.repeat(60)}\n`;
                if (slide.content) text += `${slide.content}\n\n`;
                if (slide.bullets) {
                    slide.bullets.forEach(b => text += `- ${b}\n`);
                    text += '\n';
                }
                if (slide.outcome) text += `OUTCOME: ${slide.outcome}\n\n`;
            });

            downloadTextFile(text, `${deckContent.company}_Deck.txt`);
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            initNav();
            loadHistory();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sales Deck Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <div class="logo">Sales Deck Generator</div>
                <div class="nav-links">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="history.html">History</a>
                    <button onclick="handleSignOut()" class="btn btn--secondary btn--sm">Sign Out</button>
                </div>
            </nav>
        </header>

        <main class="main-content">
            <div class="page-header">
                <h1>Welcome back!</h1>
                <p id="userEmail"></p>
            </div>

            <div class="stats-grid">
                <div class="stat-card card">
                    <h3>Total Decks</h3>
                    <p class="stat-value" id="totalDecks">0</p>
                </div>
                <div class="stat-card card">
                    <h3>This Week</h3>
                    <p class="stat-value" id="recentDecks">0</p>
                </div>
                <div class="stat-card card">
                    <h3>Top Industry</h3>
                    <p class="stat-value" id="topIndustry">-</p>
                </div>
            </div>

            <div class="actions-section">
                <div class="card">
                    <h2>Quick Actions</h2>
                    <div class="actions-grid">
                        <a href="deck-generator.html" class="action-card">
                            <h3>Generate New Deck</h3>
                            <p>Create a custom sales pitch deck</p>
                        </a>
                        <a href="outreach-generator.html" class="action-card">
                            <h3>Outreach Generator</h3>
                            <p>Generate personalized prospect playbooks</p>
                        </a>
                        <a href="history.html" class="action-card">
                            <h3>View History</h3>
                            <p>Access your saved decks</p>
                        </a>
                    </div>
                </div>
            </div>

            <div id="recentActivity" class="card" style="display: none;">
                <h2>Recent Activity</h2>
                <div id="recentList"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Check authentication
        window.addEventListener('DOMContentLoaded', async () => {
            await window.appFunctions.requireAuth();
            await loadDashboard();
        });

        // Handle sign out
        async function handleSignOut() {
            try {
                await window.appFunctions.signOut();
            } catch (error) {
                console.error('Sign out error:', error);
            }
        }

        // Load dashboard data
        async function loadDashboard() {
            try {
                const user = window.appFunctions.getCurrentUser();
                if (user) {
                    document.getElementById('userEmail').textContent = user.email;
                }

                const stats = await window.appFunctions.getDashboardStats();
                document.getElementById('totalDecks').textContent = stats.totalDecks;
                document.getElementById('recentDecks').textContent = stats.recentDecks;
                document.getElementById('topIndustry').textContent = 
                    stats.topIndustries[0] || 'None yet';

                if (stats.totalDecks > 0) {
                    const history = await window.appFunctions.getDeckHistory();
                    const recent = history.slice(0, 3);
                    
                    document.getElementById('recentActivity').style.display = 'block';
                    document.getElementById('recentList').innerHTML = recent.map(deck => {
                        const date = new Date(deck.created_at).toLocaleDateString();
                        return `
                            <div style="padding: var(--space-12); border-bottom: 1px solid var(--color-border);">
                                <strong>${deck.company_name}</strong>
                                <span style="color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-left: var(--space-8);">
                                    ${deck.industry} • ${date}
                                </span>
                            </div>
                        `;
                    }).join('');
                }

            } catch (error) {
                console.error('Dashboard load error:', error);
            }
        }
    </script>
</body>
</html>

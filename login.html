<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Vidhai Sales</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Vidhai</h1>
                <h2>Sales Intelligence</h2>
                <p>Authorized Access Only</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="label" for="email">Email</label>
                    <input type="email" id="email" class="input" placeholder="you@company.com" required>
                </div>

                <div class="form-group">
                    <label class="label" for="password">Password</label>
                    <input type="password" id="password" class="input" placeholder="••••••••" required>
                </div>

                <div id="errorMessage" class="error" style="display: none;"></div>

                <button type="submit" class="btn-primary btn-full" id="loginBtn">
                    Sign In
                </button>
            </form>

            <p class="login-footer">
                Need access? Contact your administrator<br>
                <a href="index.html">← Back to Home</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMessage');
            
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorEl.style.display = 'none';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                // Check whitelist
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('allowed_access')
                    .eq('id', data.user.id)
                    .single();
                
                if (!profile?.allowed_access) {
                    await supabase.auth.signOut();
                    throw new Error('Access not authorized. Contact administrator.');
                }
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

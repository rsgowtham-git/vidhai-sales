<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Sales Deck Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card card">
                <h1 style="text-align: center; margin-bottom: var(--space-8);">Sales Deck Generator</h1>
                <p style="text-align: center; color: var(--color-text-secondary); margin-bottom: var(--space-24);">
                    Sign in to generate custom sales decks
                </p>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('signin')">Sign In</button>
                    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Sign In Form -->
                <form id="signinForm" class="auth-form">
                    <div class="form-group">
                        <label for="signinEmail" class="form-label">Email</label>
                        <input type="email" id="signinEmail" class="form-control" required 
                               placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="signinPassword" class="form-label">Password</label>
                        <input type="password" id="signinPassword" class="form-control" required 
                               placeholder="••••••••">
                    </div>

                    <div id="signinError" class="status status--error hidden"></div>

                    <button type="submit" class="btn btn--primary btn--full-width btn--lg">
                        Sign In
                    </button>
                </form>

                <!-- Sign Up Form -->
                <form id="signupForm" class="auth-form hidden">
                    <div class="form-group">
                        <label for="signupEmail" class="form-label">Email</label>
                        <input type="email" id="signupEmail" class="form-control" required 
                               placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label for="signupPassword" class="form-label">Password</label>
                        <input type="password" id="signupPassword" class="form-control" required 
                               placeholder="••••••••" minlength="6">
                        <small style="color: var(--color-text-secondary); font-size: var(--font-size-sm);">
                            Minimum 6 characters
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="signupPasswordConfirm" class="form-label">Confirm Password</label>
                        <input type="password" id="signupPasswordConfirm" class="form-control" required 
                               placeholder="••••••••">
                    </div>

                    <div id="signupError" class="status status--error hidden"></div>
                    <div id="signupSuccess" class="status status--success hidden"></div>

                    <button type="submit" class="btn btn--primary btn--full-width btn--lg">
                        Create Account
                    </button>
                </form>

                <div style="text-align: center; margin-top: var(--space-24);">
                    <a href="index.html" style="color: var(--color-text-secondary); font-size: var(--font-size-sm);">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Tab switching
        function switchTab(tab) {
            const signinForm = document.getElementById('signinForm');
            const signupForm = document.getElementById('signupForm');
            const tabs = document.querySelectorAll('.tab');

            if (tab === 'signin') {
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                signinForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Sign In
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            const errorDiv = document.getElementById('signinError');

            try {
                await window.appFunctions.signIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'Invalid email or password';
                errorDiv.classList.remove('hidden');
            }
        });

        // Sign Up
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                await window.appFunctions.signUp(email, password);
                successDiv.textContent = 'Account created! Redirecting to dashboard...';
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message || 'Failed to create account';
                errorDiv.classList.remove('hidden');
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const isAuthenticated = await window.appFunctions.checkAuth();
            if (isAuthenticated) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-theme',window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Vidhai Sales Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card card">
            <div class="auth-brand">
                <a href="https://vidhai.co" style="text-decoration:none; color:inherit;">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="margin: 0 auto var(--space-3) auto;" aria-label="Vidhai">
                        <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
                        <path d="M12 14L20 28L28 14" stroke="var(--color-text-inverse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <h1>Vidhai</h1>
                <p>Sales Intelligence</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('signin')">Sign In</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signinForm" class="auth-form">
                <div class="form-group">
                    <label for="signinEmail" class="label">Email</label>
                    <input type="email" id="signinEmail" class="input" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="signinPassword" class="label">Password</label>
                    <input type="password" id="signinPassword" class="input" required placeholder="Enter your password">
                </div>

                <div id="signinError" class="status status--error hidden"></div>

                <button type="submit" class="btn-primary btn-full btn-lg">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form hidden">
                <div class="form-group">
                    <label for="signupEmail" class="label">Email</label>
                    <input type="email" id="signupEmail" class="input" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="signupPassword" class="label">Password</label>
                    <input type="password" id="signupPassword" class="input" required placeholder="Minimum 6 characters" minlength="6">
                    <span class="form-hint">Minimum 6 characters</span>
                </div>

                <div class="form-group">
                    <label for="signupPasswordConfirm" class="label">Confirm Password</label>
                    <input type="password" id="signupPasswordConfirm" class="input" required placeholder="Re-enter your password">
                </div>

                <div id="signupError" class="status status--error hidden"></div>
                <div id="signupSuccess" class="status status--success hidden"></div>

                <button type="submit" class="btn-primary btn-full btn-lg">Create Account</button>
            </form>

            <div class="auth-footer">
                <a href="index.html">Back to Home</a>
                <span style="margin: 0 var(--space-2);">&middot;</span>
                <a href="https://vidhai.co" target="_blank" rel="noopener">vidhai.co</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Tab switching
        function switchTab(tab) {
            const signinForm = document.getElementById('signinForm');
            const signupForm = document.getElementById('signupForm');
            const tabs = document.querySelectorAll('.tab');

            if (tab === 'signin') {
                signinForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                signinForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Sign In
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            const errorDiv = document.getElementById('signinError');

            try {
                await window.appFunctions.signIn(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message || 'Invalid email or password';
                errorDiv.classList.remove('hidden');
            }
        });

        // Sign Up
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                await window.appFunctions.signUp(email, password);
                successDiv.textContent = 'Account created! Redirecting to dashboard...';
                successDiv.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message || 'Failed to create account';
                errorDiv.classList.remove('hidden');
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const isAuthenticated = await window.appFunctions.checkAuth();
            if (isAuthenticated) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
